<script>
// classic guestbook. signatures are stored by /api/guestbook (Vercel KV).
(function () {
  var form = document.getElementById('gbform');
  var listEl = document.getElementById('entries');
  var statusEl = document.getElementById('gbstatus');

  function esc(s) {
    return String(s == null ? '' : s).replace(/[&<>"]/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c];
    });
  }

  function render(entries) {
    if (!entries || !entries.length) {
      listEl.innerHTML = '<font size="2" color="#666666">no signatures yet. be the first!</font>';
      return;
    }
    var html = '';
    for (var i = entries.length - 1; i >= 0; i--) {
      var e = entries[i];
      var bg = (i % 2 === 0) ? '#F8F8FF' : '#EFEFFF';
      var where = e.location ? ' <font color="#666666">from ' + esc(e.location) + '</font>' : '';
      html += '<table width="100%" cellpadding="8" cellspacing="0" border="0" bgcolor="' + bg + '">'
        + '<tr><td><font size="2"><b>' + esc(e.name) + '</b>' + where
        + ' <font color="#666666">(' + esc(e.date) + ')</font><br>'
        + esc(e.message) + '</font></td></tr></table><br>';
    }
    listEl.innerHTML = html;
  }

  function load() {
    fetch('/api/guestbook')
      .then(function (r) { return r.json(); })
      .then(function (d) { render(d.entries); })
      .catch(function () { listEl.innerHTML = '<font size="2" color="#999999">guestbook is offline right now.</font>'; });
  }

  form.addEventListener('submit', function (ev) {
    ev.preventDefault();
    var f = form.elements;
    var data = {
      name: f['name'].value,
      location: f['location'].value,
      message: f['message'].value,
      website: f['website'].value
    };
    if (!data.name.trim() || !data.message.trim()) {
      statusEl.innerHTML = 'please enter your name and a message.';
      return;
    }
    statusEl.innerHTML = 'signing...';
    fetch('/api/guestbook', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify(data)
    })
      .then(function (r) { return r.json(); })
      .then(function (d) {
        if (d && d.ok) { statusEl.innerHTML = 'thanks for signing!'; form.reset(); load(); }
        else { statusEl.innerHTML = (d && d.error) ? d.error : 'something went wrong.'; }
      })
      .catch(function () { statusEl.innerHTML = 'could not reach the guestbook.'; });
  });

  load();
})();
</script>
